services:
  backend:
    build:
      context: ./backend
    environment:
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SESSION_TTL_SECONDS: "3600"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CHAT_WS_URL: ws://localhost:8000/ws/chat
    depends_on:
      - backend
    ports:
      - "5173:80"